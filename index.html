<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты и Фотографии</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; color: #1a1a1a; }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #333; }
    
    .form-group { margin-bottom: 12px; }
    label { 
      display: block; 
      margin-bottom: 4px; 
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input[readonly] {
      background: #f5f5f5;
      color: #666;
    }
    textarea { 
      min-height: 100px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #007AFF;
    }
    
    /* Поля количества */
    .people-row {
      display: flex;
      gap: 12px;
    }
    .people-field {
      flex: 1;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    /* Загрузка фото */
    .photo-upload {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .photo-upload:hover {
      border-color: #007AFF;
      background: #f0f7ff;
    }
    .photo-upload input[type="file"] {
      display: none;
    }
    .photo-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .photo-text {
      color: #666;
      font-size: 14px;
    }
    .photo-hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    
    /* Превью нескольких фото */
    .photos-preview {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }
    .photo-preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .photo-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220, 53, 69, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .photo-size {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
    }
    
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:active { 
      background: #0056b3;
      transform: scale(0.98);
    }
    .btn:disabled { 
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      display: block !important; 
    }
    .error { 
      background: #f8d7da; 
      color: #721c24; 
      display: block !important; 
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      display: block !important;
    }
    
    /* История отчётов - компактная */
    .report-item {
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .report-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .report-header:active {
      background: #e9ecef;
    }
    .report-date-only {
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    .report-expand-icon {
      color: #999;
      font-size: 12px;
      transition: transform 0.3s;
    }
    .report-item.expanded .report-expand-icon {
      transform: rotate(180deg);
    }
    .report-item.expanded .report-header {
      background: #e9ecef;
    }
    
    /* Развёрнутый отчёт */
    .report-details {
      display: none;
      padding: 0 16px 16px 16px;
      border-top: 1px solid #dee2e6;
      margin-top: 0;
    }
    .report-item.expanded .report-details {
      display: block;
    }
    .detail-row {
      margin-bottom: 10px;
      font-size: 13px;
    }
    .detail-label {
      color: #888;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .detail-value {
      color: #333;
      line-height: 1.4;
    }
    .report-photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .report-photos-grid img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
      aspect-ratio: 1;
    }
    .report-badge {
      display: inline-block;
      background: #28a745;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-left: 8px;
    }
    
    .empty {
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Новый отчёт</h1>
    <p id="greeting" style="color: #666; margin: 0 0 16px 0; font-size: 14px;">Загрузка...</p>
    
    <!-- Название объекта -->
    <div class="form-group">
      <label for="objectName">🏗️ Название объекта</label>
      <input type="text" id="objectName" placeholder="Например: ЖК 'Северный', ул. Строителей, 15">
    </div>
    
    <div class="form-group">
      <label for="reportDate">📅 Дата</label>
      <input type="text" id="reportDate" readonly placeholder="Загрузка...">
    </div>
    
    <!-- Количество людей -->
    <div class="form-group">
      <label>👥 Количество людей на объекте</label>
      <div class="people-row">
        <div class="people-field">
          <input type="number" id="itrCount" placeholder="ИТР" min="0" max="999">
        </div>
        <div class="people-field">
          <input type="number" id="workersCount" placeholder="Рабочие" min="0" max="9999">
        </div>
      </div>
    </div>
    
    <div class="form-group">
      <label for="reportText">✍️ Описание работ</label>
      <textarea id="reportText" placeholder="Какие работы выполнялись сегодня?"></textarea>
    </div>
    
    <!-- Загрузка нескольких фото -->
    <div class="form-group">
      <label>📷 Фотографии <span style="font-weight:normal;color:#999;font-size:12px">(сжимаются автоматически)</span></label>
      <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotosSelect(event)">
        <div class="photo-icon">📸</div>
        <div class="photo-text">Нажмите, чтобы добавить фото</div>
        <div class="photo-hint">Макс. 5 фото, до 500 KB каждое</div>
      </div>
      <div class="photos-preview" id="photosPreview"></div>
    </div>
    
    <button class="btn" id="saveBtn" onclick="saveReport()">💾 Сохранить отчёт</button>
    <div id="status"></div>
  </div>
  
  <div class="container">
    <h2>📋 История отчётов</h2>
    <div id="reportsList">
      <div class="empty">Загрузка...</div>
    </div>
  </div>

  <script>
    let currentPhotosBase64 = [];
    let currentPhotosSizes = [];
    const MAX_PHOTOS = 5;
    const MAX_PHOTO_SIZE_KB = 500; // Максимальный размер фото после сжатия
    
    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', function() {
      initApp();
    });
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
    
    function initApp() {
      console.log('🚀 Инициализация приложения');
      
      if (typeof window.WebApp !== 'undefined') {
        console.log('✅ WebApp найден');
        try {
          window.WebApp.ready();
          if (window.WebApp.expand) window.WebApp.expand();
        } catch(e) {
          console.log('⚠️ Ошибка ready:', e.message);
        }
        
        if (window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
          const user = window.WebApp.initDataUnsafe.user;
          const name = user.first_name || user.username || 'друг';
          const greetingEl = document.getElementById('greeting');
          if (greetingEl) greetingEl.textContent = 'Привет, ' + name + '! 👋';
        }
      }
      
      const dateEl = document.getElementById('reportDate');
      if (dateEl) {
        const today = new Date();
        const dateStr = today.toLocaleDateString('ru-RU', { 
          day: 'numeric', 
          month: 'long', 
          year: 'numeric',
          weekday: 'long'
        });
        dateEl.value = dateStr;
      }
      
      loadReports();
    }
    
    // ===== СЖАТИЕ ФОТОГРАФИЙ =====
    function compressImage(file, maxWidth = 1024, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            // Уменьшаем размер если больше maxWidth
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // Сжимаем в JPEG с указанным качеством
            const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve(compressedDataUrl);
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    }
    
    function getBase64Size(base64String) {
      // Примерный размер в KB
      const padding = (base64String.match(/=+$/) || [''])[0].length;
      const bytes = (base64String.length * 0.75) - padding;
      return Math.round(bytes / 1024);
    }
    
    // ===== ОБРАБОТКА НЕСКОЛЬКИХ ФОТО =====
    async function handlePhotosSelect(event) {
      const files = Array.from(event.target.files);
      if (files.length === 0) return;
      
      const availableSlots = MAX_PHOTOS - currentPhotosBase64.length;
      if (availableSlots <= 0) {
        showStatus(`⚠️ Можно добавить максимум ${MAX_PHOTOS} фото`, 'warning');
        return;
      }
      
      const filesToAdd = files.slice(0, availableSlots);
      console.log('📷 Обработка фото:', filesToAdd.length);
      
      showStatus('🔄 Сжатие фотографий...', 'warning');
      
      let successCount = 0;
      
      for (const file of filesToAdd) {
        try {
          // Сжимаем фото
          const compressed = await compressImage(file, 1024, 0.7);
          const sizeKB = getBase64Size(compressed);
          
          // Проверяем размер после сжатия
          if (sizeKB > MAX_PHOTO_SIZE_KB * 1.5) {
            console.log('⚠️ Фото слишком большое:', sizeKB, 'KB');
            continue;
          }
          
          currentPhotosBase64.push(compressed);
          currentPhotosSizes.push(sizeKB);
          successCount++;
          
        } catch(e) {
          console.log('❌ Ошибка сжатия:', e.message);
        }
      }
      
      updatePhotosPreview();
      
      if (successCount > 0) {
        showStatus(`✅ Добавлено ${successCount} фото`, 'success');
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.impactOccurred('light');
        }
      } else {
        showStatus('⚠️ Не удалось добавить фото', 'warning');
      }
      
      setTimeout(() => {
        const statusEl = document.getElementById('status');
        if (statusEl) statusEl.className = '';
      }, 2000);
    }
    
    function updatePhotosPreview() {
      const container = document.getElementById('photosPreview');
      
      if (currentPhotosBase64.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      const totalSizeKB = currentPhotosSizes.reduce((a, b) => a + b, 0);
      
      container.innerHTML = currentPhotosBase64.map((photo, index) => `
        <div class="photo-preview-item">
          <img src="${photo}" alt="Фото ${index + 1}">
          <button class="photo-remove-btn" onclick="removePhoto(${index})">×</button>
          <div class="photo-size">${currentPhotosSizes[index]} KB</div>
        </div>
      `).join('') + `
        <div style="grid-column: 1/-1; text-align: center; font-size: 12px; color: #666; margin-top: 8px;">
          Всего: ${totalSizeKB} KB (${currentPhotosBase64.length}/${MAX_PHOTOS})
        </div>
      `;
    }
    
    function removePhoto(index) {
      currentPhotosBase64.splice(index, 1);
      currentPhotosSizes.splice(index, 1);
      updatePhotosPreview();
      
      if (window.WebApp && window.WebApp.HapticFeedback) {
        window.WebApp.HapticFeedback.impactOccurred('light');
      }
    }
    
    // ===== СОХРАНЕНИЕ ОТЧЁТА =====
    async function saveReport() {
      console.log('💾 saveReport() вызван');
      
      const objectNameEl = document.getElementById('objectName');
      const dateEl = document.getElementById('reportDate');
      const itrEl = document.getElementById('itrCount');
      const workersEl = document.getElementById('workersCount');
      const textEl = document.getElementById('reportText');
      const statusEl = document.getElementById('status');
      const saveBtn = document.getElementById('saveBtn');
      
      const objectName = objectNameEl ? objectNameEl.value.trim() : '';
      const date = dateEl ? dateEl.value : '';
      const itr = itrEl ? parseInt(itrEl.value) || 0 : 0;
      const workers = workersEl ? parseInt(workersEl.value) || 0 : 0;
      const text = textEl ? textEl.value.trim() : '';
      
      if (!objectName) {
        showStatus('⚠️ Введите название объекта', 'error');
        return;
      }
      
      if (!text) {
        showStatus('⚠️ Введите описание работ', 'error');
        return;
      }
      
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Сохранение...';
      }
      
      const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
      
      const report = {
        id: Date.now(),
        userId: userId,
        objectName: objectName,
        date: date,
        dateRaw: new Date().toISOString(),
        itr: itr,
        workers: workers,
        text: text,
        photos: [...currentPhotosBase64],
        photoSizes: [...currentPhotosSizes],
        createdAt: new Date().toISOString()
      };
      
      try {
        const key = 'reports_' + userId;
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        
        // Проверяем, хватит ли места
        const reportSize = JSON.stringify(report).length;
        const existingSize = JSON.stringify(existing).length;
        const newSize = existingSize + reportSize;
        const maxSize = 5 * 1024 * 1024; // 5 MB (безопасный лимит для iPhone)
        
        if (newSize > maxSize && currentPhotosBase64.length > 0) {
          // Пробуем сохранить без фото
          showStatus('⚠️ Мало места. Сохраняю без фото...', 'warning');
          
          const reportWithoutPhotos = { ...report, photos: [], photoSizes: [] };
          existing.unshift(reportWithoutPhotos);
          localStorage.setItem(key, JSON.stringify(existing));
          
          showStatus('✅ Отчёт сохранён (без фото - мало места)', 'warning');
          
        } else {
          existing.unshift(report);
          localStorage.setItem(key, JSON.stringify(existing));
          console.log('✅ Отчёт сохранён. Фото:', currentPhotosBase64.length);
          
          const photoCount = currentPhotosBase64.length;
          showStatus('✅ Отчёт сохранён!' + (photoCount > 0 ? ` 📷 ${photoCount}` : ''), 'success');
          
          if (window.WebApp && window.WebApp.HapticFeedback) {
            window.WebApp.HapticFeedback.notificationOccurred('success');
          }
        }
        
        // Очистка формы
        if (objectNameEl) objectNameEl.value = '';
        if (itrEl) itrEl.value = '';
        if (workersEl) workersEl.value = '';
        if (textEl) textEl.value = '';
        currentPhotosBase64 = [];
        currentPhotosSizes = [];
        updatePhotosPreview();
        
        loadReports();
        
        setTimeout(() => {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 Сохранить отчёт';
          }
          if (statusEl) statusEl.className = '';
        }, 2000);
        
      } catch(e) {
        console.log('❌ Ошибка:', e.message);
        
        if (e.name === 'QuotaExceededError' || e.message.includes('quota')) {
          showStatus('⚠️ Память заполнена. Удалите старые отчёты или сохраните без фото', 'error');
        } else {
          showStatus('❌ Ошибка: ' + e.message, 'error');
        }
        
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Сохранить отчёт';
        }
      }
    }
    
    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      if (statusEl) {
        statusEl.textContent = message;
        statusEl.className = type;
      }
    }
    
    // ===== ЗАГРУЗКА СПИСКА (КОМПАКТНАЯ) =====
    function loadReports() {
      try {
        const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
        const key = 'reports_' + userId;
        const reports = JSON.parse(localStorage.getItem(key) || '[]');
        
        console.log('📋 Отчётов:', reports.length);
        
        const container = document.getElementById('reportsList');
        if (!container) return;
        
        if (reports.length === 0) {
          container.innerHTML = '<div class="empty">Пока нет сохранённых отчётов</div>';
          return;
        }
        
        container.innerHTML = reports.map(report => {
          const photoCount = report.photos ? report.photos.length : 0;
          const photoBadge = photoCount > 0 ? `<span class="report-badge">📷 ${photoCount}</span>` : '';
          const peopleInfo = (report.itr || report.workers) 
            ? ` • ИТР: ${report.itr || 0}, Рабочие: ${report.workers || 0}`
            : '';
          
          return `
            <div class="report-item" id="report-${report.id}">
              <div class="report-header" onclick="toggleReport(${report.id})">
                <span class="report-date-only">${report.date}${photoBadge}</span>
                <span class="report-expand-icon">▼</span>
              </div>
              <div class="report-details">
                <div class="detail-row">
                  <div class="detail-label">🏗️ Объект</div>
                  <div class="detail-value">${escapeHtml(report.objectName)}</div>
                </div>
                ${peopleInfo ? `
                <div class="detail-row">
                  <div class="detail-label">👥 Люди на объекте</div>
                  <div class="detail-value">ИТР: ${report.itr || 0}, Рабочие: ${report.workers || 0}</div>
                </div>` : ''}
                <div class="detail-row">
                  <div class="detail-label">✍️ Описание работ</div>
                  <div class="detail-value">${escapeHtml(report.text)}</div>
                </div>
                ${photoCount > 0 ? `
                <div class="detail-row">
                  <div class="detail-label">📷 Фотографии</div>
                  <div class="report-photos-grid">
                    ${report.photos.map(photo => `<img src="${photo}" alt="Фото">`).join('')}
                  </div>
                </div>` : ''}
              </div>
            </div>
          `;
        }).join('');
        
      } catch(e) {
        console.log('❌ Ошибка загрузки:', e.message);
        const container = document.getElementById('reportsList');
        if (container) {
          container.innerHTML = '<div class="empty" style="color:red">Ошибка: ' + e.message + '</div>';
        }
      }
    }
    
    // ===== РАСКРЫТИЕ/СВЁРТЫВАНИЕ ОТЧЁТА =====
    function toggleReport(reportId) {
      const item = document.getElementById(`report-${reportId}`);
      if (!item) return;
      
      const isExpanded = item.classList.contains('expanded');
      
      document.querySelectorAll('.report-item').forEach(el => {
        el.classList.remove('expanded');
      });
      
      if (!isExpanded) {
        item.classList.add('expanded');
      }
      
      if (window.WebApp && window.WebApp.HapticFeedback) {
        window.WebApp.HapticFeedback.impactOccurred('light');
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>

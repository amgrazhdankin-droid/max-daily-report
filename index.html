<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты и Фотографии</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; color: #1a1a1a; }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #333; }
    
    .form-group { margin-bottom: 12px; }
    label { 
      display: block; 
      margin-bottom: 4px; 
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input[readonly] {
      background: #f5f5f5;
      color: #666;
    }
    textarea { 
      min-height: 100px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #007AFF;
    }
    
    /* Кнопка загрузки фото */
    .photo-upload {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .photo-upload:hover {
      border-color: #007AFF;
      background: #f0f7ff;
    }
    .photo-upload.has-photo {
      border-style: solid;
      border-color: #28a745;
      background: #f0fff4;
    }
    .photo-upload input[type="file"] {
      display: none;
    }
    .photo-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .photo-text {
      color: #666;
      font-size: 14px;
    }
    
    /* Предпросмотр фото */
    .photo-preview {
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .photo-preview img {
      width: 100%;
      height: auto;
      display: block;
    }
    .photo-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(220, 53, 69, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .photo-remove:active {
      background: #c82333;
    }
    
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:active { 
      background: #0056b3;
      transform: scale(0.98);
    }
    .btn:disabled { 
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      display: block !important; 
    }
    .error { 
      background: #f8d7da; 
      color: #721c24; 
      display: block !important; 
    }
    
    /* Карточка отчёта с фото */
    .report-card {
      background: #f8f9fa;
      border-left: 3px solid #007AFF;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .report-date {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .report-text {
      font-size: 14px;
      color: #333;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .report-photo {
      margin-top: 8px;
      border-radius: 6px;
      overflow: hidden;
    }
    .report-photo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .report-has-photo {
      border-left-color: #28a745;
    }
    .empty {
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Отчёт с фото</h1>
    <p id="greeting" style="color: #666; margin: 0 0 16px 0; font-size: 14px;">Загрузка...</p>
    
    <div class="form-group">
      <label for="reportDate">📅 Дата</label>
      <input type="text" id="reportDate" readonly placeholder="Загрузка...">
    </div>
    
    <div class="form-group">
      <label for="reportText">✍️ Ваш отчёт</label>
      <textarea id="reportText" placeholder="Как прошёл день? Что сделали?"></textarea>
    </div>
    
    <!-- Загрузка фото -->
    <div class="form-group">
      <label>📷 Фотография</label>
      <div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
        <div class="photo-icon">📸</div>
        <div class="photo-text">Нажмите, чтобы добавить фото</div>
      </div>
      <div class="photo-preview" id="photoPreview" style="display: none;">
        <img id="previewImg" src="" alt="Фото">
        <button class="photo-remove" onclick="removePhoto()">×</button>
      </div>
    </div>
    
    <button class="btn" id="saveBtn" onclick="saveReport()">💾 Сохранить отчёт</button>
    <div id="status"></div>
  </div>
  
  <div class="container">
    <h2>📋 История отчётов</h2>
    <div id="reportsList">
      <div class="empty">Загрузка...</div>
    </div>
  </div>

  <script>
    let currentPhotoBase64 = null;
    
    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', function() {
      initApp();
    });
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
    
    function initApp() {
      console.log('🚀 Инициализация приложения');
      
      // WebApp
      if (typeof window.WebApp !== 'undefined') {
        console.log('✅ WebApp найден');
        try {
          window.WebApp.ready();
          if (window.WebApp.expand) window.WebApp.expand();
        } catch(e) {
          console.log('⚠️ Ошибка ready:', e.message);
        }
        
        // Приветствие
        if (window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
          const user = window.WebApp.initDataUnsafe.user;
          const name = user.first_name || user.username || 'друг';
          const greetingEl = document.getElementById('greeting');
          if (greetingEl) greetingEl.textContent = 'Привет, ' + name + '! 👋';
        }
      }
      
      // Дата
      const dateEl = document.getElementById('reportDate');
      if (dateEl) {
        const today = new Date();
        const dateStr = today.toLocaleDateString('ru-RU', { 
          day: 'numeric', 
          month: 'long', 
          year: 'numeric',
          weekday: 'long'
        });
        dateEl.value = dateStr;
      }
      
      // Загрузка списка
      loadReports();
    }
    
    // ===== ОБРАБОТКА ФОТО =====
    function handlePhotoSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      console.log('📷 Выбран файл:', file.name);
      
      const reader = new FileReader();
      reader.onload = function(e) {
        currentPhotoBase64 = e.target.result;
        
        // Показываем превью
        const preview = document.getElementById('photoPreview');
        const previewImg = document.getElementById('previewImg');
        const uploadBox = document.getElementById('photoUpload');
        
        previewImg.src = currentPhotoBase64;
        preview.style.display = 'block';
        uploadBox.classList.add('has-photo');
        
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.impactOccurred('light');
        }
      };
      reader.readAsDataURL(file);
    }
    
    function removePhoto() {
      currentPhotoBase64 = null;
      document.getElementById('photoInput').value = '';
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('photoUpload').classList.remove('has-photo');
      
      if (window.WebApp && window.WebApp.HapticFeedback) {
        window.WebApp.HapticFeedback.impactOccurred('light');
      }
    }
    
    // ===== СОХРАНЕНИЕ ОТЧЁТА =====
    function saveReport() {
      console.log('💾 saveReport() вызван');
      
      const textEl = document.getElementById('reportText');
      const dateEl = document.getElementById('reportDate');
      const statusEl = document.getElementById('status');
      const saveBtn = document.getElementById('saveBtn');
      
      const text = textEl ? textEl.value.trim() : '';
      const date = dateEl ? dateEl.value : '';
      
      if (!text) {
        if (statusEl) {
          statusEl.textContent = '⚠️ Введите текст отчёта';
          statusEl.className = 'error';
        }
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.notificationOccurred('error');
        }
        return;
      }
      
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Сохранение...';
      }
      
      const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
      
      const report = {
        id: Date.now(),
        userId: userId,
        date: date,
        text: text,
        photo: currentPhotoBase64, // Сохраняем фото в base64
        createdAt: new Date().toISOString()
      };
      
      try {
        const key = 'reports_' + userId;
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        existing.unshift(report);
        localStorage.setItem(key, JSON.stringify(existing));
        console.log('✅ Отчёт сохранён с фото:', !!currentPhotoBase64);
        
        if (statusEl) {
          statusEl.textContent = '✅ Отчёт сохранён!' + (currentPhotoBase64 ? ' 📷' : '');
          statusEl.className = 'success';
        }
        
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.notificationOccurred('success');
        }
        
        if (textEl) textEl.value = '';
        removePhoto();
        loadReports();
        
        setTimeout(() => {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 Сохранить отчёт';
          }
          if (statusEl) statusEl.className = '';
        }, 2000);
        
      } catch(e) {
        console.log('❌ Ошибка:', e.message);
        if (statusEl) {
          statusEl.textContent = '❌ Ошибка: ' + e.message;
          statusEl.className = 'error';
        }
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Сохранить отчёт';
        }
      }
    }
    
    // ===== ЗАГРУЗКА СПИСКА =====
    function loadReports() {
      try {
        const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
        const key = 'reports_' + userId;
        const reports = JSON.parse(localStorage.getItem(key) || '[]');
        
        console.log('📋 Отчётов:', reports.length);
        
        const container = document.getElementById('reportsList');
        if (!container) return;
        
        if (reports.length === 0) {
          container.innerHTML = '<div class="empty">Пока нет сохранённых отчётов</div>';
          return;
        }
        
        container.innerHTML = reports.map(report => {
          const hasPhoto = report.photo ? 'report-has-photo' : '';
          const photoHtml = report.photo 
            ? `<div class="report-photo"><img src="${report.photo}" alt="Фото"></div>`
            : '';
          
          return `
            <div class="report-card ${hasPhoto}">
              <div class="report-date">${report.date}${report.photo ? ' 📷' : ''}</div>
              <div class="report-text">${escapeHtml(report.text)}</div>
              ${photoHtml}
            </div>
          `;
        }).join('');
        
      } catch(e) {
        console.log('❌ Ошибка загрузки:', e.message);
        const container = document.getElementById('reportsList');
        if (container) {
          container.innerHTML = '<div class="empty" style="color:red">Ошибка</div>';
        }
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты и Фотографии</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; }
    .debug {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      font-family: monospace;
    }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { min-height: 100px; }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
    }
    .btn:disabled { background: #ccc; }
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }
    .success { background: #d4edda; color: #155724; display: block !important; }
    .error { background: #f8d7da; color: #721c24; display: block !important; }
  </style>
</head>
<body>
  <!-- БЛОК ОТЛАДКИ -->
  <div class="debug" id="debugBox">🔍 Отладка...</div>
  
  <div class="container">
    <h1>📝 Ежедневный отчёт</h1>
    <p id="greeting">Загрузка...</p>
    
    <div class="form-group">
      <label>📅 Дата</label>
      <input type="text" id="reportDate" readonly>
    </div>
    
    <div class="form-group">
      <label>✍️ Ваш отчёт</label>
      <textarea id="reportText" placeholder="Как прошёл день?"></textarea>
    </div>
    
    <button class="btn" id="saveBtn" onclick="saveReport()">💾 Сохранить отчёт</button>
    <div id="status"></div>
  </div>
  
  <div class="container">
    <h2>📋 История</h2>
    <div id="reportsList"></div>
  </div>

  <script>
    // ===== ОТЛАДКА =====
    const debug = document.getElementById('debugBox');
    let debugInfo = ['🚀 Запуск приложения...'];
    
    function addDebug(msg) {
      debugInfo.push(msg);
      debug.innerHTML = debugInfo.join('<br>');
      console.log(msg);
    }
    
    try {
      addDebug('1. Проверяем window.WebApp...');
      
      // ===== ИНИЦИАЛИЗАЦИЯ =====
      if (typeof window.WebApp !== 'undefined') {
        addDebug('✅ WebApp найден');
        
        try {
          window.WebApp.ready();
          addDebug('✅ WebApp.ready() вызван');
        } catch(e) {
          addDebug('❌ Ошибка ready(): ' + e.message);
        }
        
        // Проверяем данные пользователя
        if (window.WebApp.initDataUnsafe) {
          addDebug('✅ initDataUnsafe доступен');
          
          if (window.WebApp.initDataUnsafe.user) {
            const user = window.WebApp.initDataUnsafe.user;
            addDebug('✅ Пользователь: ' + JSON.stringify(user));
            
            const name = user.first_name || user.username || 'друг';
            document.getElementById('greeting').textContent = 'Привет, ' + name + '! 👋';
            addDebug('✅ Приветствие установлено');
          } else {
            addDebug('⚠️ user не найден в initDataUnsafe');
            document.getElementById('greeting').textContent = 'Привет! (нет данных)';
          }
        } else {
          addDebug('❌ initDataUnsafe не доступен');
          document.getElementById('greeting').textContent = 'Привет!';
        }
        
      } else {
        addDebug('❌ WebApp НЕ найден!');
        document.getElementById('greeting').textContent = 'Привет! (не MAX)';
      }
      
      // ===== ДАТА =====
      addDebug('2. Устанавливаем дату...');
      try {
        const today = new Date();
        const dateStr = today.toLocaleDateString('ru-RU', { 
          day: 'numeric', 
          month: 'long', 
          year: 'numeric' 
        });
        document.getElementById('reportDate').value = dateStr;
        addDebug('✅ Дата: ' + dateStr);
      } catch(e) {
        addDebug('❌ Ошибка даты: ' + e.message);
      }
      
      // ===== ЗАГРУЗКА ОТЧЁТОВ =====
      addDebug('3. Загружаем отчёты...');
      loadReports();
      
    } catch(e) {
      addDebug('💥 КРИТИЧЕСКАЯ ОШИБКА: ' + e.message);
      addDebug('Stack: ' + e.stack);
    }
    
    // ===== СОХРАНЕНИЕ =====
    function saveReport() {
      addDebug('🔵 saveReport() вызван');
      
      const text = document.getElementById('reportText').value.trim();
      const date = document.getElementById('reportDate').value;
      const statusEl = document.getElementById('status');
      
      if (!text) {
        statusEl.textContent = '⚠️ Введите текст отчёта';
        statusEl.className = 'error';
        addDebug('⚠️ Пустой текст');
        return;
      }
      
      const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
      addDebug('👤 User ID: ' + userId);
      
      const report = {
        id: Date.now(),
        userId: userId,
        date: date,
        text: text,
        createdAt: new Date().toISOString()
      };
      
      try {
        const key = 'reports_' + userId;
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        existing.unshift(report);
        localStorage.setItem(key, JSON.stringify(existing));
        addDebug('✅ Отчёт сохранён в localStorage');
        
        statusEl.textContent = '✅ Сохранено!';
        statusEl.className = 'success';
        
        document.getElementById('reportText').value = '';
        loadReports();
        
      } catch(e) {
        addDebug('❌ Ошибка сохранения: ' + e.message);
        statusEl.textContent = '❌ Ошибка: ' + e.message;
        statusEl.className = 'error';
      }
    }
    
    // ===== ЗАГРУЗКА СПИСКА =====
    function loadReports() {
      try {
        const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
        const key = 'reports_' + userId;
        const reports = JSON.parse(localStorage.getItem(key) || '[]');
        
        addDebug('📋 Отчётов: ' + reports.length);
        
        const container = document.getElementById('reportsList');
        
        if (reports.length === 0) {
          container.innerHTML = '<p style="color:#999;font-size:13px;">Нет отчётов</p>';
          return;
        }
        
        container.innerHTML = reports.map(r => 
          '<div style="background:#f8f9fa;padding:8px;border-radius:6px;margin-bottom:8px;">' +
          '<small style="color:#666">' + r.date + '</small><br>' +
          r.text.substring(0, 50) + (r.text.length > 50 ? '...' : '') +
          '</div>'
        ).join('');
        
      } catch(e) {
        addDebug('❌ Ошибка загрузки списка: ' + e.message);
      }
    }
  </script>
</body>
</html>

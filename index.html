<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Строительные Отчёты</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; padding: 16px; background: #f5f5f5; margin: 0; }
    .container { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    h1 { margin: 0 0 8px 0; font-size: 20px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 14px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    textarea { min-height: 100px; }
    .people-row { display: flex; gap: 12px; }
    .people-field { flex: 1; }
    .work-item { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #007AFF; }
    .work-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .work-desc { flex: 1; }
    .work-percent { width: 80px; }
    .work-remove { background: #dc3545; color: white; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    .add-work-btn { background: #28a745; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
    .photo-upload { border: 2px dashed #ddd; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; background: #fafafa; }
    .photo-upload:hover { border-color: #007AFF; background: #f0f7ff; }
    .photo-upload input[type="file"] { display: none; }
    .photo-icon { font-size: 32px; margin-bottom: 8px; }
    .photo-text { color: #666; font-size: 14px; }
    .photos-preview { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
    .photo-preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
    .photo-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(220, 53, 69, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 16px; }
    .btn { background: #007AFF; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; }
    .btn:disabled { background: #ccc; }
    #status { margin-top: 8px; padding: 8px; border-radius: 6px; text-align: center; display: none; font-size: 14px; }
    .success { background: #d4edda; color: #155724; display: block !important; }
    .error { background: #f8d7da; color: #721c24; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Новый отчёт</h1>
    <p id="greeting" style="color: #666; margin: 0 0 16px 0; font-size: 14px;">Загрузка...</p>
    
    <div class="form-group">
      <label>🏗️ Название объекта</label>
      <input type="text" id="objectName" placeholder="Например: Новая Волна">
    </div>
    <div class="form-group">
      <label>📅 Дата</label>
      <input type="text" id="reportDate" readonly>
    </div>
    <div class="form-group">
      <label>👥 Люди на объекте</label>
      <div class="people-row">
        <div class="people-field"><input type="number" id="itrCount" placeholder="ИТР"></div>
        <div class="people-field"><input type="number" id="workersCount" placeholder="Рабочие"></div>
      </div>
    </div>
    <div class="form-group">
      <label>📋 Работы</label>
      <div id="worksList"></div>
      <button type="button" class="add-work-btn" onclick="addWorkItem()">➕ Добавить работу</button>
    </div>
    <div class="form-group">
      <label>📷 Фото</label>
      <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotosSelect(event)">
        <div class="photo-icon">📸</div>
        <div class="photo-text">Добавить фото (макс. 10)</div>
      </div>
      <div class="photos-preview" id="photosPreview"></div>
    </div>
    
    <button class="btn" id="saveBtn" onclick="sendReport()">📤 Отправить отчёт</button>
    <div id="status"></div>
  </div>

  <script>
    const GROUP_ID = '-72662613274024';
    let currentPhotosBase64 = [];
    const MAX_PHOTOS = 10;
    let workItemCount = 0;
    
    document.addEventListener('DOMContentLoaded', function() {
      initApp();
      addWorkItem();
    });
    
    function initApp() {
      if (window.WebApp) {
        window.WebApp.ready();
        if (window.WebApp.initDataUnsafe?.user) {
          const name = window.WebApp.initDataUnsafe.user.first_name || 'друг';
          document.getElementById('greeting').textContent = 'Привет, ' + name + '! 👋';
        }
      }
      document.getElementById('reportDate').value = new Date().toLocaleDateString('ru-RU', { 
        day: 'numeric', month: 'long', year: 'numeric' 
      });
    }
    
    function addWorkItem() {
      workItemCount++;
      const container = document.getElementById('worksList');
      const workDiv = document.createElement('div');
      workDiv.className = 'work-item';
      workDiv.id = `work-${workItemCount}`;
      workDiv.innerHTML = `
        <div class="work-row">
          <input type="text" class="work-desc" placeholder="Описание работы">
          <input type="number" class="work-percent" placeholder="%" min="0" max="100">
        </div>
        ${workItemCount > 1 ? `<button class="work-remove" onclick="removeWorkItem(${workItemCount})">🗑️</button>` : ''}
      `;
      container.appendChild(workDiv);
    }
    
    function removeWorkItem(id) {
      const item = document.getElementById(`work-${id}`);
      if (item) item.remove();
    }
    
    function getWorksData() {
      const works = [];
      document.querySelectorAll('.work-item').forEach(item => {
        const desc = item.querySelector('.work-desc').value.trim();
        const percent = item.querySelector('.work-percent').value;
        if (desc) works.push({ description: desc, percent: percent ? `${percent}%` : '' });
      });
      return works;
    }
    
    function compressImage(file, maxWidth = 1024, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    }
    
    async function handlePhotosSelect(event) {
      const files = Array.from(event.target.files);
      if (files.length === 0) return;
      const available = MAX_PHOTOS - currentPhotosBase64.length;
      if (available <= 0) {
        showStatus(`⚠️ Максимум ${MAX_PHOTOS} фото`, 'warning');
        return;
      }
      const toAdd = files.slice(0, available);
      let count = 0;
      for (const file of toAdd) {
        try {
          currentPhotosBase64.push(await compressImage(file));
          count++;
        } catch(e) { console.log('❌', e.message); }
      }
      updatePhotosPreview();
      showStatus(`✅ Добавлено ${count} фото`, 'success');
      setTimeout(() => document.getElementById('status').className = '', 2000);
    }
    
    function updatePhotosPreview() {
      const container = document.getElementById('photosPreview');
      if (currentPhotosBase64.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = currentPhotosBase64.map((photo, i) => `
        <div class="photo-preview-item">
          <img src="${photo}">
          <button class="photo-remove-btn" onclick="removePhoto(${i})">×</button>
        </div>
      `).join('');
    }
    
    function removePhoto(i) {
      currentPhotosBase64.splice(i, 1);
      updatePhotosPreview();
    }
    
    async function sendReport() {
      const objectName = document.getElementById('objectName').value.trim();
      const date = document.getElementById('reportDate').value;
      const itr = parseInt(document.getElementById('itrCount').value) || 0;
      const workers = parseInt(document.getElementById('workersCount').value) || 0;
      const works = getWorksData();
      
      if (!objectName) { showStatus('⚠️ Введите объект', 'error'); return; }
      if (works.length === 0) { showStatus('⚠️ Добавьте работы', 'error'); return; }
      
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Отправка...';
      
      const user = window.WebApp?.initDataUnsafe?.user || {};
      const authorName = user.last_name && user.first_name 
        ? `${user.last_name} ${user.first_name.charAt(0)}.`
        : (user.first_name || user.last_name || 'Аноним');
      
      // Формируем сообщение
      let message = `📝 *НОВЫЙ ОТЧЁТ*\n\n`;
      message += `🏗️ *Объект:* ${objectName}\n`;
      message += `📅 *Дата:* ${date}\n`;
      message += `👥 *Люди:* ИТР: ${itr}, Рабочие: ${workers}\n\n`;
      message += `📋 *Работы:*\n`;
      works.forEach((w, i) => {
        message += `${i+1}. ${w.description}${w.percent ? ' - '+w.percent : ''}\n`;
      });
      message += `\n━━━━━━━━━━━━━━━━\n👤 *Отчет составил:* ${authorName}`;
      
      // Формируем данные для отправки боту
      const payload = {
        type: 'daily_report',
        groupId: GROUP_ID,
        message: message,
        photos: currentPhotosBase64,
        user: {
          id: user.id,
          first_name: user.first_name,
          last_name: user.last_name
        }
      };
      
      try {
        // 🎯 ОТПРАВКА ЧЕРЕЗ postEvent (официальный способ MAX)
        if (window.WebApp && window.WebApp.postEvent) {
          window.WebApp.postEvent('report_submitted', payload);
          console.log('✅ postEvent отправлен');
          
          showStatus('✅ Отчёт отправлен! Проверь группу', 'success');
          
          if (window.WebApp.HapticFeedback) {
            window.WebApp.HapticFeedback.notificationOccurred('success');
          }
          
          // Очистка формы
          document.getElementById('objectName').value = '';
          document.getElementById('itrCount').value = '';
          document.getElementById('workersCount').value = '';
          document.getElementById('worksList').innerHTML = '';
          currentPhotosBase64 = [];
          updatePhotosPreview();
          workItemCount = 0;
          addWorkItem();
          
        } else {
          throw new Error('postEvent не доступен');
        }
        
      } catch(error) {
        console.error('❌ Ошибка:', error);
        showStatus('❌ Ошибка: ' + error.message, 'error');
      }
      
      saveBtn.disabled = false;
      saveBtn.textContent = '📤 Отправить отчёт';
      setTimeout(() => document.getElementById('status').className = '', 3000);
    }
    
    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест отправки данных</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    h2 { margin: 0 0 12px 0; font-size: 16px; }
    .method-item {
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      font-family: monospace;
    }
    .method-available { background: #d4edda; border-left: 3px solid #28a745; }
    .method-unavailable { background: #f8d7da; border-left: 3px solid #dc3545; }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    .debug-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      font-family: monospace;
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    #testOutput { margin-top: 12px; padding: 12px; background: #e9ecef; border-radius: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔍 Доступные методы WebApp</h2>
    <div id="methodsList"></div>
  </div>
  
  <div class="container">
    <h2>🧪 Тест отправки данных</h2>
    <textarea id="testData" placeholder="Введи тестовые данные" style="width:100%;min-height:80px;padding:10px;border:1px solid #ddd;border-radius:8px;">Тест отчёта: Всё хорошо</textarea>
    <button class="btn" onclick="testSendData()">📤 Отправить данные боту</button>
    <div id="testOutput"></div>
  </div>
  
  <div class="container">
    <h2>📋 Информация о пользователе</h2>
    <div class="debug-box" id="userInfo"></div>
  </div>

  <script>
    const output = document.getElementById('methodsList');
    const userInfo = document.getElementById('userInfo');
    const testOutput = document.getElementById('testOutput');
    
    // ===== ПРОВЕРКА МЕТОДОВ =====
    function checkMethods() {
      const methods = [
        'sendData',
        'send',
        'postEvent',
        'sendMessage',
        'sendToBot',
        'ready',
        'expand',
        'close',
        'HapticFeedback',
        'initData',
        'initDataUnsafe'
      ];
      
      let html = '';
      methods.forEach(method => {
        const available = window.WebApp && (window.WebApp[method] !== undefined);
        const className = available ? 'method-available' : 'method-unavailable';
        const icon = available ? '✅' : '❌';
        const type = typeof window.WebApp?.[method];
        
        html += `
          <div class="method-item ${className}">
            ${icon} <strong>${method}</strong> — ${type}
            ${available && type === 'function' ? '<br>&nbsp;&nbsp;📝 Можно вызывать' : ''}
            ${available && type === 'string' ? '<br>&nbsp;&nbsp;📄 Значение: ' + window.WebApp[method].substring(0, 50) + '...' : ''}
          </div>
        `;
      });
      
      output.innerHTML = html;
    }
    
    // ===== ПОКАЗАТЬ ИНФОРМАЦИЮ О ПОЛЬЗОВАТЕЛЕ =====
    function showUserInfo() {
      if (window.WebApp && window.WebApp.initDataUnsafe) {
        const user = window.WebApp.initDataUnsafe.user;
        const chat = window.WebApp.initDataUnsafe.chat;
        
        userInfo.innerHTML = `
          <div><strong>User ID:</strong> ${user?.id || 'не найдено'}</div>
          <div><strong>Имя:</strong> ${user?.first_name || 'не найдено'} ${user?.last_name || ''}</div>
          <div><strong>Username:</strong> ${user?.username || 'не найдено'}</div>
          <div><strong>Chat ID:</strong> ${chat?.id || 'не найдено'}</div>
          <div><strong>Chat Type:</strong> ${chat?.type || 'не найдено'}</div>
          <hr style="border:0;border-top:1px solid #ddd;margin:8px 0;">
          <div><strong>initData (полный):</strong></div>
          <div style="word-break:break-all;font-size:11px;">${window.WebApp.initData?.substring(0, 200) || 'не найдено'}...</div>
        `;
      } else {
        userInfo.innerHTML = '<div style="color:red;">⚠️ WebApp или initDataUnsafe не доступен</div>';
      }
    }
    
    // ===== ТЕСТ ОТПРАВКИ ДАННЫХ =====
    async function testSendData() {
      const testData = document.getElementById('testData').value;
      const result = [];
      
      result.push('🚀 Начинаем тест отправки...\n');
      
      // Метод 1: sendData (как Telegram)
      if (window.WebApp && window.WebApp.sendData) {
        result.push('📤 Метод 1: WebApp.sendData()');
        try {
          const payload = JSON.stringify({
            type: 'test_report',
            data: testData,
            timestamp: new Date().toISOString()
          });
          window.WebApp.sendData(payload);
          result.push('✅ sendData() вызван успешно!\n');
          result.push('📝 Данные отправлены боту. Проверь чат с ботом!\n');
        } catch(e) {
          result.push('❌ Ошибка: ' + e.message + '\n');
        }
      } else {
        result.push('❌ Метод 1: sendData() не доступен\n');
      }
      
      // Метод 2: postEvent
      if (window.WebApp && window.WebApp.postEvent) {
        result.push('📤 Метод 2: WebApp.postEvent()');
        try {
          window.WebApp.postEvent('web_app_data_send', {
            data: testData,
            timestamp: Date.now()
          });
          result.push('✅ postEvent() вызван успешно!\n');
        } catch(e) {
          result.push('❌ Ошибка: ' + e.message + '\n');
        }
      } else {
        result.push('❌ Метод 2: postEvent() не доступен\n');
      }
      
      // Метод 3: close с данными (костыль)
      result.push('📤 Метод 3: Копирование данных в буфер');
      try {
        const payload = JSON.stringify({
          type: 'report',
          object: 'Тестовый объект',
          description: testData,
          user: window.WebApp?.initDataUnsafe?.user?.first_name || 'Аноним',
          timestamp: new Date().toLocaleString('ru-RU')
        });
        
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(payload);
          result.push('✅ Данные скопированы в буфер обмена!\n');
          result.push('📋 Вставь их боту вручную для теста\n');
        } else {
          result.push('⚠️ Буфер обмена не доступен\n');
        }
      } catch(e) {
        result.push('❌ Ошибка: ' + e.message + '\n');
      }
      
      testOutput.innerHTML = '<pre>' + result.join('') + '</pre>';
      
      if (window.WebApp && window.WebApp.HapticFeedback) {
        window.WebApp.HapticFeedback.notificationOccurred('success');
      }
    }
    
    // ===== ЗАПУСК ПРИ СТАРТЕ =====
    window.addEventListener('load', () => {
      if (window.WebApp) {
        window.WebApp.ready();
        if (window.WebApp.expand) window.WebApp.expand();
      }
      checkMethods();
      showUserInfo();
    });
  </script>
</body>
</html>

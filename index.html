<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты и Фотографии</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; color: #1a1a1a; }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #333; }
    
    .form-group { margin-bottom: 12px; }
    label { 
      display: block; 
      margin-bottom: 4px; 
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input[readonly] {
      background: #f5f5f5;
      color: #666;
    }
    textarea { 
      min-height: 100px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #007AFF;
    }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:active { 
      background: #0056b3;
      transform: scale(0.98);
    }
    .btn:disabled { 
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      display: block !important; 
    }
    .error { 
      background: #f8d7da; 
      color: #721c24; 
      display: block !important; 
    }
    .report-card {
      background: #f8f9fa;
      border-left: 3px solid #007AFF;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .report-date {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .report-text {
      font-size: 14px;
      color: #333;
      line-height: 1.4;
    }
    .empty {
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Ежедневный отчёт</h1>
    <p id="greeting" style="color: #666; margin: 0 0 16px 0; font-size: 14px;">Загрузка...</p>
    
    <div class="form-group">
      <label for="reportDate">📅 Дата</label>
      <input type="text" id="reportDate" readonly placeholder="Загрузка...">
    </div>
    
    <div class="form-group">
      <label for="reportText">✍️ Ваш отчёт</label>
      <textarea id="reportText" placeholder="Как прошёл день? Что сделали?"></textarea>
    </div>
    
    <button class="btn" id="saveBtn" onclick="saveReport()">💾 Сохранить отчёт</button>
    <div id="status"></div>
  </div>
  
  <div class="container">
    <h2>📋 История отчётов</h2>
    <div id="reportsList">
      <div class="empty">Загрузка...</div>
    </div>
  </div>

  <script>
    // ===== ЖДЁМ ПОЛНОЙ ЗАГРУЗКИ СТРАНИЦЫ =====
    document.addEventListener('DOMContentLoaded', function() {
      addDebug('📄 DOM загружен, инициализация...');
      initApp();
    });
    
    // Если DOM уже загружен (на всякий случай)
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
    
    function initApp() {
      addDebug('🚀 Инициализация приложения');
      
      // ===== ИНИЦИАЛИЗАЦИЯ WEBAPP =====
      if (typeof window.WebApp !== 'undefined') {
        addDebug('✅ WebApp найден');
        
        try {
          window.WebApp.ready();
          addDebug('✅ WebApp.ready() вызван');
          
          // Пробуем развернуть на весь экран
          if (window.WebApp.expand) {
            window.WebApp.expand();
          }
        } catch(e) {
          addDebug('⚠️ Ошибка ready: ' + e.message);
        }
        
        // ===== ПРИВЕТСТВИЕ =====
        if (window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
          const user = window.WebApp.initDataUnsafe.user;
          addDebug('👤 Пользователь: ' + user.first_name + ' ' + user.last_name);
          
          const name = user.first_name || user.username || 'друг';
          const greetingEl = document.getElementById('greeting');
          if (greetingEl) {
            greetingEl.textContent = 'Привет, ' + name + '! 👋';
            addDebug('✅ Приветствие установлено');
          }
        } else {
          addDebug('⚠️ Данные пользователя не найдены');
          const greetingEl = document.getElementById('greeting');
          if (greetingEl) greetingEl.textContent = 'Привет!';
        }
        
      } else {
        addDebug('❌ WebApp не найден');
        const greetingEl = document.getElementById('greeting');
        if (greetingEl) greetingEl.textContent = 'Привет! (тестовый режим)';
      }
      
      // ===== УСТАНОВКА ДАТЫ =====
      const dateEl = document.getElementById('reportDate');
      if (dateEl) {
        const today = new Date();
        const dateStr = today.toLocaleDateString('ru-RU', { 
          day: 'numeric', 
          month: 'long', 
          year: 'numeric',
          weekday: 'long'
        });
        dateEl.value = dateStr;
        addDebug('📅 Дата установлена: ' + dateStr);
      }
      
      // ===== ЗАГРУЗКА СПИСКА ОТЧЁТОВ =====
      loadReports();
      
      addDebug('✅ Инициализация завершена');
    }
    
    // ===== СОХРАНЕНИЕ ОТЧЁТА =====
    function saveReport() {
      addDebug('💾 saveReport() вызван');
      
      const textEl = document.getElementById('reportText');
      const dateEl = document.getElementById('reportDate');
      const statusEl = document.getElementById('status');
      const saveBtn = document.getElementById('saveBtn');
      
      const text = textEl ? textEl.value.trim() : '';
      const date = dateEl ? dateEl.value : '';
      
      if (!text) {
        if (statusEl) {
          statusEl.textContent = '⚠️ Введите текст отчёта';
          statusEl.className = 'error';
        }
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.notificationOccurred('error');
        }
        addDebug('⚠️ Пустой текст');
        return;
      }
      
      // Блокируем кнопку
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Сохранение...';
      }
      
      const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
      addDebug('👤 User ID: ' + userId);
      
      const report = {
        id: Date.now(),
        userId: userId,
        date: date,
        text: text,
        createdAt: new Date().toISOString()
      };
      
      try {
        const key = 'reports_' + userId;
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        existing.unshift(report);
        localStorage.setItem(key, JSON.stringify(existing));
        addDebug('✅ Отчёт сохранён (всего: ' + existing.length + ')');
        
        if (statusEl) {
          statusEl.textContent = '✅ Отчёт сохранён!';
          statusEl.className = 'success';
        }
        
        if (window.WebApp && window.WebApp.HapticFeedback) {
          window.WebApp.HapticFeedback.notificationOccurred('success');
        }
        
        // Очищаем поле
        if (textEl) textEl.value = '';
        
        // Обновляем список
        loadReports();
        
        // Разблокируем кнопку
        setTimeout(() => {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 Сохранить отчёт';
          }
          if (statusEl) {
            statusEl.className = '';
          }
        }, 2000);
        
      } catch(e) {
        addDebug('❌ Ошибка сохранения: ' + e.message);
        if (statusEl) {
          statusEl.textContent = '❌ Ошибка: ' + e.message;
          statusEl.className = 'error';
        }
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Сохранить отчёт';
        }
      }
    }
    
    // ===== ЗАГРУЗКА СПИСКА ОТЧЁТОВ =====
    function loadReports() {
      try {
        const userId = window.WebApp?.initDataUnsafe?.user?.id || 'guest';
        const key = 'reports_' + userId;
        const reports = JSON.parse(localStorage.getItem(key) || '[]');
        
        addDebug('📋 Загрузка отчётов: ' + reports.length);
        
        const container = document.getElementById('reportsList');
        if (!container) {
          addDebug('❌ Контейнер reportsList не найден');
          return;
        }
        
        if (reports.length === 0) {
          container.innerHTML = '<div class="empty">Пока нет сохранённых отчётов</div>';
          return;
        }
        
        container.innerHTML = reports.map(report => `
          <div class="report-card">
            <div class="report-date">${report.date}</div>
            <div class="report-text">${escapeHtml(report.text)}</div>
          </div>
        `).join('');
        
        addDebug('✅ Список отчётов отображён');
        
      } catch(e) {
        addDebug('❌ Ошибка загрузки списка: ' + e.message);
        const container = document.getElementById('reportsList');
        if (container) {
          container.innerHTML = '<div class="empty" style="color:red">Ошибка загрузки</div>';
        }
      }
    }
    
    // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function addDebug(msg) {
      console.log('[APP]', msg);
      // Можно добавить отображение отладки на экране, если нужно
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест MAX</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #fff; }
    .box { background: #f0f0f0; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
    .ok { color: green; font-weight: bold; }
    .err { color: red; }
  </style>
</head>
<body>
  <h3>🔍 Тест подключения</h3>
  <div id="output"></div>

  <script>
    const out = document.getElementById('output');
    
    // 1. Показываем, какие объекты есть
    const objects = ['MaxWebApp', 'MAX', 'WebApp', 'MaxApp', 'TelegramWebApp'];
    objects.forEach(name => {
      const exists = window[name] ? '✓' : '✗';
      out.innerHTML += `<div class="${exists === '✓' ? 'ok' : 'err'}">${exists} ${name}</div>`;
    });
    
    // 2. Пытаемся найти данные пользователя
    let found = false;
    objects.forEach(name => {
      const obj = window[name];
      if (obj && obj.initDataUnsafe && obj.initDataUnsafe.user) {
        const user = obj.initDataUnsafe.user;
        out.innerHTML += `<div class="box"><strong>✓ Нашел пользователя в ${name}:</strong><br>` + 
          JSON.stringify(user, null, 2) + '</div>';
        found = true;
        
        // Пробуем сказать приложению, что оно готово
        if (obj.ready) obj.ready();
      }
    });
    
    if (!found) {
      out.innerHTML += `<div class="box">⚠️ Данные пользователя не найдены.<br>
        <small>initDataUnsafe: ${!!(window.MaxWebApp?.initDataUnsafe || window.MAX?.initDataUnsafe || window.WebApp?.initDataUnsafe)}</small></div>`;
    }
    
    // 3. Показываем ВСЕ глобальные переменные со словом "max" или "web"
    const allVars = Object.keys(window).filter(k => k.toLowerCase().includes('max') || k.toLowerCase().includes('web'));
    if (allVars.length > 0) {
      out.innerHTML += `<div class="box"><strong>Другие похожие переменные:</strong><br>${allVars.join(', ')}</div>`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёты и Фотографии</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; color: #1a1a1a; }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #333; }
    
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; font-size: 14px; }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input[readonly] { background: #f5f5f5; color: #666; }
    textarea { min-height: 100px; resize: vertical; }
    textarea:focus, input:focus { outline: none; border-color: #007AFF; }
    
    .people-row { display: flex; gap: 12px; }
    .people-field { flex: 1; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    
    .photo-upload {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .photo-upload:hover { border-color: #007AFF; background: #f0f7ff; }
    .photo-upload input[type="file"] { display: none; }
    .photo-icon { font-size: 32px; margin-bottom: 8px; }
    .photo-text { color: #666; font-size: 14px; }
    .photo-hint { font-size: 12px; color: #999; margin-top: 4px; }
    
    .photos-preview {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }
    .photo-preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .photo-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220, 53, 69, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 16px;
    }
    
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:active { background: #0056b3; transform: scale(0.98); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success { background: #d4edda; color: #155724; display: block !important; }
    .error { background: #f8d7da; color: #721c24; display: block !important; }
    .warning { background: #fff3cd; color: #856404; display: block !important; }
    
    .empty { color: #999; font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Новый отчёт</h1>
    <p id="greeting" style="color: #666; margin: 0 0 16px 0; font-size: 14px;">Загрузка...</p>
    
    <div class="form-group">
      <label for="objectName">🏗️ Название объекта</label>
      <input type="text" id="objectName" placeholder="Например: ЖК 'Северный', ул. Строителей, 15">
    </div>
    
    <div class="form-group">
      <label for="reportDate">📅 Дата</label>
      <input type="text" id="reportDate" readonly placeholder="Загрузка...">
    </div>
    
    <div class="form-group">
      <label>👥 Количество людей на объекте</label>
      <div class="people-row">
        <div class="people-field">
          <input type="number" id="itrCount" placeholder="ИТР" min="0" max="999">
        </div>
        <div class="people-field">
          <input type="number" id="workersCount" placeholder="Рабочие" min="0" max="9999">
        </div>
      </div>
    </div>
    
    <div class="form-group">
      <label for="reportText">✍️ Описание работ</label>
      <textarea id="reportText" placeholder="Какие работы выполнялись сегодня?"></textarea>
    </div>
    
    <div class="form-group">
      <label>📷 Фотографии</label>
      <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotosSelect(event)">
        <div class="photo-icon">📸</div>
        <div class="photo-text">Нажмите, чтобы добавить фото</div>
        <div class="photo-hint">Макс. 5 фото</div>
      </div>
      <div class="photos-preview" id="photosPreview"></div>
    </div>
    
    <button class="btn" id="saveBtn" onclick="sendReportToBot()">📤 Отправить отчёт в группу</button>
    <div id="status"></div>
  </div>

  <script>
    let currentPhotosBase64 = [];
    const MAX_PHOTOS = 5;
    
    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', function() {
      initApp();
    });
    
    function initApp() {
      if (window.WebApp) {
        window.WebApp.ready();
        
        if (window.WebApp.initDataUnsafe && window.WebApp.initDataUnsafe.user) {
          const user = window.WebApp.initDataUnsafe.user;
          const name = user.first_name || user.username || 'друг';
          document.getElementById('greeting').textContent = 'Привет, ' + name + '! 👋';
        }
      }
      
      const today = new Date();
      const dateStr = today.toLocaleDateString('ru-RU', { 
        day: 'numeric', month: 'long', year: 'numeric', weekday: 'long'
      });
      document.getElementById('reportDate').value = dateStr;
    }
    
    // ===== СЖАТИЕ ФОТО =====
    function compressImage(file, maxWidth = 1024, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    }
    
    async function handlePhotosSelect(event) {
      const files = Array.from(event.target.files);
      if (files.length === 0) return;
      
      const availableSlots = MAX_PHOTOS - currentPhotosBase64.length;
      if (availableSlots <= 0) {
        showStatus(`⚠️ Можно добавить максимум ${MAX_PHOTOS} фото`, 'warning');
        return;
      }
      
      const filesToAdd = files.slice(0, availableSlots);
      showStatus('🔄 Сжатие фотографий...', 'warning');
      
      let successCount = 0;
      for (const file of filesToAdd) {
        try {
          const compressed = await compressImage(file, 1024, 0.7);
          currentPhotosBase64.push(compressed);
          successCount++;
        } catch(e) {
          console.log('❌ Ошибка:', e.message);
        }
      }
      
      updatePhotosPreview();
      showStatus(`✅ Добавлено ${successCount} фото`, 'success');
      setTimeout(() => document.getElementById('status').className = '', 2000);
    }
    
    function updatePhotosPreview() {
      const container = document.getElementById('photosPreview');
      if (currentPhotosBase64.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = currentPhotosBase64.map((photo, index) => `
        <div class="photo-preview-item">
          <img src="${photo}" alt="Фото ${index + 1}">
          <button class="photo-remove-btn" onclick="removePhoto(${index})">×</button>
        </div>
      `).join('');
    }
    
    function removePhoto(index) {
      currentPhotosBase64.splice(index, 1);
      updatePhotosPreview();
    }
    
    // ===== ОТПРАВКА ОТЧЁТА БОТУ =====
    async function sendReportToBot() {
      const objectName = document.getElementById('objectName').value.trim();
      const date = document.getElementById('reportDate').value;
      const itr = parseInt(document.getElementById('itrCount').value) || 0;
      const workers = parseInt(document.getElementById('workersCount').value) || 0;
      const text = document.getElementById('reportText').value.trim();
      
      if (!objectName) {
        showStatus('⚠️ Введите название объекта', 'error');
        return;
      }
      if (!text) {
        showStatus('⚠️ Введите описание работ', 'error');
        return;
      }
      
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Отправка...';
      showStatus('📤 Отправка отчёта...', 'warning');
      
      // Получаем данные пользователя
      const user = window.WebApp?.initDataUnsafe?.user || {};
      const initData = window.WebApp?.initData || '';
      
      // Формируем отчёт
      const report = {
        type: 'daily_report',
        objectName,
        date,
        itr,
        workers,
        text,
        photos: currentPhotosBase64,
        user: {
          id: user.id,
          first_name: user.first_name,
          last_name: user.last_name,
          username: user.username
        },
        timestamp: new Date().toISOString(),
        initData: initData // Для валидации на сервере
      };
      
      try {
        // ОТПРАВКА ЧЕРЕЗ postEvent
        if (window.WebApp && window.WebApp.postEvent) {
          window.WebApp.postEvent('report_submitted', report);
          console.log('✅ Отчёт отправлен через postEvent');
        }
        
        // ДОПОЛНИТЕЛЬНО: Отправка на сервер бота (если есть)
        // Замени URL на свой, когда создашь сервер
        /*
        const response = await fetch('https://твой-сервер.onrender.com/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(report)
        });
        
        if (!response.ok) throw new Error('Ошибка сервера');
        */
        
        showStatus('✅ Отчёт отправлен! Проверь группу', 'success');
        
        if (window.WebApp?.HapticFeedback) {
          window.WebApp.HapticFeedback.notificationOccurred('success');
        }
        
        // Очистка формы
        document.getElementById('objectName').value = '';
        document.getElementById('itrCount').value = '';
        document.getElementById('workersCount').value = '';
        document.getElementById('reportText').value = '';
        currentPhotosBase64 = [];
        updatePhotosPreview();
        
        setTimeout(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = '📤 Отправить отчёт в группу';
          document.getElementById('status').className = '';
        }, 3000);
        
      } catch(error) {
        console.error('❌ Ошибка:', error);
        showStatus('❌ Ошибка отправки: ' + error.message, 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = '📤 Отправить отчёт в группу';
      }
    }
    
    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = type;
    }
  </script>
</body>
</html>
